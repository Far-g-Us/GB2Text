[pytest]
minversion = 7.0
testpaths = tests
addopts = -v --tb=short --strict-markers --cov=core --cov=plugins --cov-report=term-missing --cov-report=html
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    gui: marks tests as GUI tests (requires display)
    unit: marks tests as unit tests
    plugin: marks tests as plugin-related tests
    benchmark: marks tests as performance benchmarks
    robot: marks robot framework tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning