name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pylint mypy types-python-dateutil types-PyYAML

      - name: Run Ruff (fast linter)
        run: |
          ruff check . --output-format=github
        continue-on-error: true

      - name: Run Pylint on core modules
        run: |
          pylint core/ --output-format=text --score=no || true
        continue-on-error: true

      - name: Run Pylint on GUI modules
        run: |
          pylint gui/ --output-format=text --score=no || true
        continue-on-error: true

      - name: Run Pylint on main.py
        run: |
          pylint main.py --output-format=text --score=no || true
        continue-on-error: true

      - name: Run MyPy type checking on core
        run: |
          mypy core/ --ignore-missing-imports --no-error-summary || true
        continue-on-error: true

      - name: Run MyPy type checking on gui
        run: |
          mypy gui/ --ignore-missing-imports --no-error-summary || true
        continue-on-error: true

      - name: Check code formatting with Black
        run: |
          pip install black
          black --check core/ gui/ main.py --diff || true
        continue-on-error: true

      - name: Check for common issues with Bandit
        run: |
          pip install bandit
          bandit -r core/ gui/ -f json || true
        continue-on-error: true

  quality-summary:
    needs: lint
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Quality check summary
        run: |
          echo "## Quality Checks Summary" >> $GITHUB_STEP_SUMMARY
          echo "✅ Ruff linter - Fast Python linter" >> $GITHUB_STEP_SUMMARY
          echo "✅ Pylint - Code analysis" >> $GITHUB_STEP_SUMMARY
          echo "✅ MyPy - Type checking" >> $GITHUB_STEP_SUMMARY
          echo "✅ Black - Code formatting" >> $GITHUB_STEP_SUMMARY
          echo "✅ Bandit - Security testing" >> $GITHUB_STEP_SUMMARY